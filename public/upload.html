<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enviar Video - MeuTube</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <a class="logo" href="/">Meu<span>Tube</span></a>
  <div></div>
  <a href="/" class="btn btn-outline">Voltar</a>
</header>
<div class="container">
  <div class="upload-box">
    <h2>Enviar Video</h2>
    <div class="form-group">
      <label>Titulo *</label>
      <input type="text" id="title" placeholder="Nome do seu video" maxlength="100">
    </div>
    <div class="form-group">
      <label>Descricao</label>
      <textarea id="description" placeholder="Fale um pouco sobre o video..."></textarea>
    </div>
    <div class="form-group">
      <label>Arquivo de Video *</label>
      <div class="drop-area" id="drop-area" onclick="document.getElementById('fileInput').click()">
        <div class="icon">&#127909;</div>
        <strong id="file-name">Clique ou arraste o video aqui</strong>
        <p>MP4, WebM, OGG, MOV, AVI, MKV - Max 2GB</p>
        <input type="file" id="fileInput" accept="video/*">
      </div>
      <div class="progress-bar-wrap" id="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div id="upload-status"></div>
    </div>
    <button class="btn btn-red" style="width:100%;padding:14px;font-size:1rem;" onclick="enviar()">
      Enviar Video
    </button>
  </div>
</div>
<script>
  var dropArea = document.getElementById('drop-area');
  var fileInput = document.getElementById('fileInput');
  fileInput.addEventListener('change', function() {
    if (fileInput.files[0]) document.getElementById('file-name').textContent = fileInput.files[0].name;
  });
  ['dragenter','dragover'].forEach(function(e) {
    dropArea.addEventListener(e, function(ev) { ev.preventDefault(); dropArea.classList.add('dragover'); });
  });
  ['dragleave','drop'].forEach(function(e) {
    dropArea.addEventListener(e, function(ev) {
      ev.preventDefault(); dropArea.classList.remove('dragover');
      if (e === 'drop' && ev.dataTransfer.files[0]) {
        fileInput.files = ev.dataTransfer.files;
        document.getElementById('file-name').textContent = ev.dataTransfer.files[0].name;
      }
    });
  });
  function enviar() {
    var title = document.getElementById('title').value.trim();
    var description = document.getElementById('description').value.trim();
    var file = fileInput.files[0];
    if (!title) return alert('Por favor, insira um titulo.');
    if (!file) return alert('Por favor, selecione um video.');
    var formData = new FormData();
    formData.append('title', title);
    formData.append('description', description);
    formData.append('video', file);
    var xhr = new XMLHttpRequest();
    document.getElementById('progress-wrap').style.display = 'block';
    var status = document.getElementById('upload-status');
    var bar = document.getElementById('progress-bar');
    xhr.upload.addEventListener('progress', function(e) {
      if (e.lengthComputable) {
        var pct = Math.round((e.loaded / e.total) * 100);
        bar.style.width = pct + '%';
        status.textContent = 'Enviando... ' + pct + '%';
      }
    });
    xhr.addEventListener('load', function() {
      var res = JSON.parse(xhr.responseText);
      if (res.success) {
        status.textContent = 'Video enviado! Redirecionando...';
        setTimeout(function() { window.location.href = 'watch.html?id=' + res.id; }, 1500);
      } else {
        status.textContent = 'Erro: ' + res.error;
      }
    });
    xhr.addEventListener('error', function() { status.textContent = 'Erro ao enviar o video.'; });
    xhr.open('POST', '/api/upload');
    xhr.send(formData);
  }
</script>
</body>
</html>
